<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NotLetters Mail</title>
<style>
  body {
    background-color: #111;
    color: #eee;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
  }
  header {
    padding: 10px 20px;
    background-color: #222;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  h1 {
    margin: 0;
  }
  .content {
    display: flex;
    height: calc(100vh - 50px);
  }
  .sidebar {
    width: 250px;
    background-color: #222;
    padding: 10px;
  }
  .mail-list {
    list-style: none;
    padding: 0;
  }
  .mail-item {
    padding: 8px;
    border-bottom: 1px solid #444;
    cursor: pointer;
  }
  .mail-item:hover {
    background-color: #333;
  }
  .main {
    flex: 1;
    padding: 20px;
  }
  button {
    background-color: #444;
    border: none;
    padding: 8px 16px;
    color: #fff;
    border-radius: 4px;
    cursor: pointer;
  }
  button:hover {
    background-color: #555;
  }
</style>
</head>
<body>
<header>
<h1>NOTLETTERS</h1>
<button onclick="logout()">Logout</button>
</header>
<div class="content">
<div class="sidebar">
<h3>Emails</h3>
<ul class="mail-list" id="mailList">
  <li class="mail-item" onclick="showEmail('Email 1', 'Content of email 1')">noreply1@discord.com</li>
  <li class="mail-item" onclick="showEmail('Email 2', 'Content of email 2')">noreply2@discord.com</li>
  <li class="mail-item" onclick="showEmail('Email 3', 'Content of email 3')">noreply3@discord.com</li>
</ul>
</div>
<div class="main" id="emailContent">
<h2>Welcome</h2>
<p>Select an email to view</p>
</div>
</div>

<script>
  function showEmail(subject, content) {
    document.getElementById('emailContent').innerHTML = '<h2>' + subject + '</h2><p>' + content + '</p>';
  }

  function logout() {
    localStorage.removeItem('isAdmin');
    window.location.href = 'index.html';
  }

  // Check login status
  if (localStorage.getItem('isAdmin') !== 'true') {
    alert('Access denied.');
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
