<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login - NotLetters</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background-color: #000; /* Dark background */
    font-family: 'Arial', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .login-box {
    width: 350px;
    background-color: #1a1a1a; /* Slightly lighter dark for container */
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Logo style */
  .logo {
    margin-bottom: 20px;
    font-weight: bold;
    font-size: 24px;
    color: #ffb347; /* Similar to the orange color in logo */
    letter-spacing: 2px;
  }

  /* Heading */
  .title {
    font-size: 20px;
    color: #fff;
    margin-bottom: 20px;
    font-weight: 500;
  }

  /* Inputs */
  input[type=email],
  input[type=password] {
    width: 100%;
    padding: 14px 15px;
    margin-bottom: 15px;
    border: none;
    border-radius: 8px;
    background-color: #333;
    font-size: 14px;
    color: #fff;
    outline: none;
  }

  input[type=email]:focus,
  input[type=password]:focus {
    background-color: #444;
  }

  /* Error message */
  .error {
    color: red;
    font-size: 13px;
    margin-bottom: 10px;
    height: 16px;
  }

  /* Button */
  button {
    width: 100%;
    padding: 14px 15px;
    background-color: #b38b4e; /* Similar to the button color */
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 600;
    transition: background-color 0.3s;
  }

  button:hover {
    background-color: #9b6f3d;
  }

  /* Forgot password link */
  .forgot {
    margin-top: 15px;
    font-size: 13px;
    color: #aaa;
    text-decoration: none;
    align-self: flex-start;
  }

  .forgot:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>

<div class="login-box">
  <!-- Logo -->
  <div class="logo">NOTLETTERS</div>
  <!-- Title -->
  <div class="title">Log in to mail</div>
  <!-- Form -->
  <form action="#" method="POST">
    <input type="email" placeholder="Email" required />
    <input type="password" placeholder="Password" required />
    <div class="error" id="error-message"></div>
    <button type="submit">Log in</button>
  </form>
  <a href="#" class="forgot">Forgot password?</a>
</div>

<script>
  // Optional: simulate error message
  // document.getElementById('error-message').innerText = 'Incorrect email address';
</script>

</body>
</html>
