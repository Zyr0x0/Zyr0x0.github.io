<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NotLetters Login</title>
<style>
  body {
    background-color: #111;
    color: #eee;
    font-family: Arial, sans-serif;
    display: flex;
    height: 100vh;
    align-items: center;
    justify-content: center;
  }
  .login-box {
    background: #222;
    padding: 20px;
    border-radius: 8px;
    width: 300px;
  }
  input {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border: none;
    border-radius: 4px;
  }
  button {
    width: 100%;
    padding: 10px;
    margin-top: 12px;
    background-color: #444;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
  button:hover {
    background-color: #555;
  }
  .error {
    color: red;
    margin-top: 8px;
    font-size: 0.9em;
  }
</style>
</head>
<body>
<div class="login-box">
<h2>Log in to NotLetters</h2>
<input type="text" id="email" placeholder="Email" />
<input type="password" id="password" placeholder="Password" />
<button onclick="login()">Log In</button>
<div class="error" id="errorMsg"></div>
</div>

<script>
  // Hardcoded admin credentials
  const admins = {
    'admin@example.com': 'adminpass'
  };

  function login() {
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('password').value.trim();
    const errorDiv = document.getElementById('errorMsg');

    if (admins[email] && admins[email] === pass) {
      localStorage.setItem('isAdmin', 'true');
      window.location.href = 'mail.html'; // load email interface
    } else {
      errorDiv.textContent = 'Invalid credentials or not admin.';
    }
  }
</script>
</body>
</html>
