<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zyrox Mail</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; background: #f0f0f0; }
h1 { text-align: center; }
form { max-width: 400px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; }
input, textarea { width: 100%; margin-bottom: 10px; padding: 8px; }
button { width: 100%; padding: 10px; background: #222; color: #fff; border: none; border-radius: 4px; }
button:hover { background: #444; }
</style>
</head>
<body>
<h1>Zyrox Mail</h1>
<form id="emailForm">
  <input type="email" placeholder="Email" required />
  <input type="text" placeholder="Recipient Email" required />
  <input type="text" placeholder="Subject" required />
  <textarea placeholder="Message" rows="4" required></textarea>
  <button type="submit">Send</button>
</form>
<script>
document.getElementById('emailForm').addEventListener('submit', function(e) {
  e.preventDefault();
  alert('Your message has been "sent"! It will be forwarded to your email.');
});
</script>
</body>
</html>
